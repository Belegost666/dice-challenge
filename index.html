<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Challenge - Pink & Gold</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --gold-light: #f9f295;
            --pink: #ff69b4; 
            --pink-soft: #fff0f6;
            --white: #ffffff;
            --text-dark: #4a4a4a;
            --danger: #ff4d4d;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--pink-soft); 
            color: var(--text-dark); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh; 
            margin: 0;
        }

        .container { 
            background: var(--white); 
            padding: 30px; 
            border-radius: 30px; 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15); 
            border: 2px solid var(--gold);
        }

        h2 { color: var(--pink); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; font-weight: 300; }
        
        .game-board { 
            border: 2px dashed var(--pink); border-radius: 20px; padding: 20px; margin-bottom: 20px; 
            background: var(--white); min-height: 120px; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 15px;
        }

        .die { 
            width: 65px; height: 65px; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1));
            background-color: transparent;
        }

        .die.rolling { animation: shake 0.1s infinite linear; }
        @keyframes shake { 0% { transform: rotate(5deg); } 50% { transform: rotate(-5deg); } }

        .prob-display { font-size: 1.6rem; color: var(--gold); margin: 10px 0; font-weight: bold; }

        .tirage-container { display: none; margin: 25px 0; }
        .jauge-wrapper { 
            width: 100%; height: 35px; background: #222; border-radius: 10px; 
            position: relative; border: 2px solid var(--gold); overflow: visible; 
        }
        .zone-succes { 
            height: 100%; background: linear-gradient(90deg, var(--gold), var(--pink)); 
            width: 0%; position: absolute; left: 0; top: 0; border-radius: 8px 0 0 8px;
            transition: width 0.8s ease-out; 
        }
        .curseur { 
            position: absolute; top: -8px; left: 0%; width: 6px; height: 51px; 
            background: var(--white); box-shadow: 0 0 15px var(--gold-light), 0 0 5px #000; 
            z-index: 10; border-radius: 3px;
        }

        .timer-display { 
            font-size: 2.8rem; color: var(--pink); margin: 15px 0; display: none; 
            font-weight: bold; background: var(--pink-soft); padding: 15px; 
            border-radius: 15px; border: 2px solid var(--pink);
        }
        
        .main-btn { 
            background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 100%); 
            color: white; border: none; padding: 18px; border-radius: 50px; 
            cursor: pointer; width: 100%; font-size: 1.2rem; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3); transition: all 0.3s;
            margin-bottom: 15px;
        }

        .secondary-btn {
            background: none; color: var(--text-dark); border: 1px solid #ccc;
            padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9rem;
            transition: all 0.2s; opacity: 0.7;
        }
        .secondary-btn:hover { opacity: 1; background: #eee; }

        .reset-btn { color: var(--danger); border-color: var(--danger); margin-top: 10px; }

        .main-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        .result-val { font-size: 3.5rem; color: var(--pink); font-weight: bold; margin-top: 5px;}
        .status-msg { font-size: 1.1rem; margin-top: 15px; color: var(--text-dark); font-weight: bold; min-height: 3em; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h2>💖 Dice Challenge 💖</h2>
    
    <div id="gameBoard" class="game-board"></div>
    <div id="probDisplay" class="prob-display">Chance : 0%</div>

    <button id="btnRoll" class="main-btn" onclick="startSequence()">Lancer la manche</button>

    <div id="timerDisplay" class="timer-display">00:00</div>

    <div id="tirageArea" class="tirage-container">
        <div class="jauge-wrapper">
            <div id="successZone" class="zone-succes"></div>
            <div id="cursor" class="curseur"></div>
        </div>
        <div id="resultVal" class="result-val">--</div>
    </div>

    <div id="statusLog" class="status-msg">Prête ?</div>

    <hr style="width: 80%; border: 0; border-top: 1px solid #eee; margin: 20px 0;">
    
    <button class="secondary-btn reset-btn" onclick="resetGame()">✨ Nouveau Cycle (Reset)</button>
</div>

<script>
    const diceImages = {
        1: 'dice_01.png', 2: 'dice_02.png', 3: 'dice_03.png', 4: 'dice_04.png',
        5: 'dice_05.png', 6: 'dice_06.png', 7: 'dice_07.png', 8: 'dice_08.png'
    };

    let diceValues = [];
    let isLocked = false;
    let timerInterval = null;

    function initApp() {
        const savedDice = localStorage.getItem('diceReserve');
        const lastUpdateStr = localStorage.getItem('lastDailyUpdate');
        const now = new Date();

        if (savedDice === null) {
            setupFirstTime();
        } else {
            diceValues = JSON.parse(savedDice);
            // Vérification quotidienne (6h du matin)
            const todayStr = now.toDateString();
            if (lastUpdateStr !== todayStr && now.getHours() >= 6) {
                diceValues.push(8);
                localStorage.setItem('diceReserve', JSON.stringify(diceValues));
                localStorage.setItem('lastDailyUpdate', todayStr);
            }
        }
        renderDice();
    }

    function setupFirstTime() {
        diceValues = [8]; 
        localStorage.setItem('diceReserve', JSON.stringify(diceValues));
        localStorage.setItem('lastDailyUpdate', new Date().toDateString());
    }

    function resetGame() {
        if (confirm("Voulez-vous vraiment vider la réserve et recommencer avec 1 seul dé ?")) {
            localStorage.clear();
            setupFirstTime();
            location.reload(); // Recharge la page pour tout remettre à zéro proprement
        }
    }

    function renderDice() {
        const board = document.getElementById('gameBoard');
        board.innerHTML = "";
        diceValues.forEach((val) => {
            const d = document.createElement('div');
            d.className = 'die';
            d.style.backgroundImage = `url('${diceImages[val] || diceImages[8]}')`;
            board.appendChild(d);
        });
        document.getElementById('btnRoll').disabled = (diceValues.length === 0 || isLocked);
        updateProb();
    }

    function updateProb() {
        let sum = diceValues.reduce((a, b) => a + b, 0);
        const chance = Math.min(sum, 100);
        document.getElementById('probDisplay').innerText = `Chance : ${chance}%`;
        return chance;
    }

    async function startSequence() {
        if (isLocked || diceValues.length === 0) return;
        isLocked = true;
        document.getElementById('btnRoll').disabled = true;
        document.getElementById('statusLog').innerText = "Lancement des dés...";
        
        const diceElements = document.querySelectorAll('.die');
        let totalSum = 0;

        for (let i = 0; i < diceElements.length; i++) {
            diceElements[i].classList.add('rolling');
            const rollInt = setInterval(() => {
                const temp = Math.floor(Math.random()*8)+1;
                diceElements[i].style.backgroundImage = `url('${diceImages[temp]}')`;
            }, 80);

            await new Promise(r => setTimeout(r, 800));
            
            clearInterval(rollInt);
            const val = Math.floor(Math.random() * 8) + 1;
            diceElements[i].style.backgroundImage = `url('${diceImages[val]}')`;
            diceElements[i].classList.remove('rolling');
            totalSum += val;
            document.getElementById('probDisplay').innerText = `Chance : ${Math.min(totalSum, 100)}%`;
        }

        const chance = Math.min(totalSum, 100);
        setTimeout(() => runGauge(chance, totalSum), 500);
    }

    function runGauge(chance, rawSum) {
        const area = document.getElementById('tirageArea');
        const successZone = document.getElementById('successZone');
        const cursor = document.getElementById('cursor');
        const resultVal = document.getElementById('resultVal');
        
        area.style.display = "block";
        successZone.style.width = chance + "%";
        document.getElementById('statusLog').innerText = "Tirage de la chance...";

        const target = Math.floor(Math.random() * 100) + 1;
        const anim = cursor.animate([
            { left: '0%' }, { left: '100%' }, { left: '0%' }, { left: '100%' }, { left: target + '%' }
        ], { duration: 3000, easing: 'cubic-bezier(0.2, 0, 0.2, 1)', fill: 'forwards' });

        anim.onfinish = () => {
            resultVal.innerText = target;
            const won = target <= chance;
            const sessionTime = Math.min(Math.round(5 + (rawSum / 100) * 15), 20);
            
            if (won) {
                document.getElementById('statusLog').innerHTML = `🎯 CIBLE ATTEINTE !<br>Session : <span style="color:var(--pink)">${sessionTime} min</span>.<br><span style="color:var(--gold)">RÉCOMPENSE : Jouissance autorisée !</span>`;
                diceValues = []; 
                localStorage.setItem('diceReserve', JSON.stringify(diceValues));
            } else {
                document.getElementById('statusLog').innerHTML = `❌ ÉCHEC DU TIRAGE.<br>Session : <span style="color:var(--pink)">${sessionTime} min</span>.<br><span style="color:var(--pink)">INTERDICTION de jouir.</span>`;
            }
            
            setTimeout(() => startChrono(sessionTime, won), 3000);
        };
    }

    function startChrono(minutes, canCum) {
        const display = document.getElementById('timerDisplay');
        document.getElementById('tirageArea').style.display = "none";
        display.style.display = "block";
        
        let seconds = minutes * 60;
        const updateText = () => {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            display.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        };
        
        updateText();
        if(timerInterval) clearInterval(timerInterval);

        timerInterval = setInterval(() => {
            seconds--;
            updateText();
            if (seconds <= 0) {
                clearInterval(timerInterval);
                display.style.display = "none";
                document.getElementById('statusLog').innerHTML = canCum ? 
                    "<h3 style='color:var(--gold)'>✨ TEMPS ÉCOULÉ ✨<br>LIBÉRATION AUTORISÉE ! 💦</h3>" : 
                    "<h3 style='color:var(--pink)'>🛑 TEMPS ÉCOULÉ 🛑<br>Arrêt immédiat. Pas de plaisir final.</h3>";
                isLocked = false;
                renderDice();
            }
        }, 1000);
    }

    initApp();
</script>
</body>
</html>
